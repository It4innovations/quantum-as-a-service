<html lang="en">

    <title>Quantum States Histogram Animation</title>

        body {
            margin: 0;

        }
        
        .animate-pulse {
            animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: .7;
            }
        }
        
        .bg-gradient-to-r {
            background: linear-gradient(to right, var(--tw-gradient-stops));
        }
        
        .from-blue-400 {
            --tw-gradient-from: #60a5fa;
            --tw-gradient-to: rgb(96 165 250 / 0);
            --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to);
        }
        
        .to-purple-500 {
            --tw-gradient-to: #a855f7;
        }
        
        .from-blue-500 {
            --tw-gradient-from: #3b82f6;
            --tw-gradient-to: rgb(59 130 246 / 0);
            --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to);
        }
        
        .to-purple-600 {
            --tw-gradient-to: #9333ea;
        }
        
        .bg-clip-text {
            background-clip: text;
            -webkit-background-clip: text;
        }
        
        .text-transparent {
            color: transparent;
        }

    <div id="root"></div>

        const { useState, useEffect, useRef } = React;

        const QuantumHistogram = ({ states, animationSpeed = 25 }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [counts, setCounts] = useState({});
            const [isPlaying, setIsPlaying] = useState(false);
            const [isComplete, setIsComplete] = useState(false);
            const intervalRef = useRef(null);

            // Parse the states array from comma-separated string
            const parsedStates = states;
            const totalStates = parsedStates.length;
            
            // Get unique states and initialize counts
            const uniqueStates = [...new Set(parsedStates)].sort();
            
            // Initialize counts for all unique states
            React.useEffect(() => {
                const initialCounts = {};
                uniqueStates.forEach(state => {
                    initialCounts[state] = 0;
                });
                setCounts(initialCounts);
            }, [states]);

            useEffect(() => {
                if (isPlaying && currentIndex < totalStates) {
                    intervalRef.current = setInterval(() => {
                        setCurrentIndex(prevIndex => {
                            const newIndex = prevIndex + 1;
                            
                            if (newIndex <= totalStates) {
                                // Update counts with the new state
                                const newState = parsedStates[prevIndex];
                                setCounts(prevCounts => ({
                                    ...prevCounts,
                                    [newState]: (prevCounts[newState] || 0) + 1
                                }));
                            }
                            
                            if (newIndex >= totalStates) {
                                setIsPlaying(false);
                                setIsComplete(true);
                                return totalStates;
                            }
                            
                            return newIndex;
                        });
                    }, animationSpeed);
                }

                return () => {
                    if (intervalRef.current) {
                        clearInterval(intervalRef.current);
                    }
                };
            }, [isPlaying, currentIndex, totalStates, animationSpeed, parsedStates]);

            const maxCount = Math.max(...Object.values(counts));
            const barHeight = 300;

            const handleStart = () => {
                setIsPlaying(true);
            };

            const handlePause = () => {
                setIsPlaying(false);
            };

            const handleReset = () => {
                setIsPlaying(false);
                setCurrentIndex(0);
                const resetCounts = {};
                uniqueStates.forEach(state => {
                    resetCounts[state] = 0;
                });
                setCounts(resetCounts);
                setIsComplete(false);
            };

            // Generate colors dynamically based on number of unique states
            const generateColors = (numStates) => {
                const colors = [];
                for (let i = 0; i < numStates; i++) {
                    const hue = (i * 360) / numStates;
                    colors.push(`hsl(${hue}, 70%, 60%)`);
                }
                return colors;
            };

            const stateColors = generateColors(uniqueStates.length);
            
            const getBarColor = (state) => {
                const index = uniqueStates.indexOf(state);
                return stateColors[index] || '#999';
            };

            const progress = (currentIndex / totalStates) * 100;

            return React.createElement('div', { 
                className: "p-6 bg-gray-900 text-white min-h-screen" 
            }, 
                React.createElement('div', { className: "max-w-6xl mx-auto" },
                    React.createElement('h1', { 
                        className: "text-3xl font-bold mb-2 text-center bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent" 
                    }, "Quantum States Visualization"),
                    React.createElement('p', { 
                        className: "text-gray-400 text-center mb-6"

                    React.createElement('div', { className: "flex justify-center gap-4 mb-6" },

                            className: "px-6 py-2 bg-yellow-600 hover:bg-yellow-700 disabled:bg-gray-600 disabled:opacity-50 rounded-lg font-semibold transition-colors"

                        React.createElement('button', {
                            onClick: handleReset,
                            className: "px-6 py-2 bg-red-600 hover:bg-red-700 rounded-lg font-semibold transition-colors"
                        }, 'Reset')

                            React.createElement('span', {}, `${progress.toFixed(1)}%`)

                        React.createElement('div', { className: "w-full bg-gray-700 rounded-full h-3" },
                            React.createElement('div', {
                                className: "bg-gradient-to-r from-blue-500 to-purple-600 h-3 rounded-full transition-all duration-100 ease-out",
                                style: { width: `${progress}%` }
                            })
                        )
                    ),

                    // Current state indicator
                    (currentIndex > 0 && currentIndex <= totalStates) &&

                            React.createElement('span', { className: "text-lg" }, "Current state: "),
                            React.createElement('span', {
                                className: "text-2xl font-bold px-3 py-1 rounded",
                                style: { 
                                    backgroundColor: getBarColor(parsedStates[currentIndex - 1]),
                                    color: 'white'
                                }
                            }, `|${parsedStates[currentIndex - 1]}⟩`)

                            style: {

                                paddingLeft: '20px',

                                const heightPercent = maxCount > 0 ? (count / maxCount) * 100 : 0;
                                const actualHeight = (heightPercent / 100) * barHeight;

                                return React.createElement('div', { 
                                    key: state, 
                                    className: "flex flex-col items-center flex-shrink-0" 
                                },
                                    // Count label
                                    React.createElement('div', { className: "text-xl font-bold mb-2 h-8" },
                                        count > 0 && React.createElement('span', { className: "animate-pulse" }, count)
                                    ),
                                    
                                    // Bar container
                                    React.createElement('div', {
                                        className: "bg-gray-700 rounded-t-lg flex flex-col-reverse relative overflow-hidden",
                                        style: { 
                                            height: `${barHeight}px`,
                                            width: '80px',  // Fixed width for better visibility
                                            minWidth: '80px'
                                        }
                                    },
                                        // Animated bar
                                        React.createElement('div', {
                                            className: "w-full rounded-t-lg transition-all duration-200 ease-out relative",
                                            style: { 
                                                height: `${actualHeight}px`,
                                                backgroundColor: getBarColor(state),
                                                boxShadow: count > 0 ? `0 0 20px ${getBarColor(state)}40` : 'none'
                                            }
                                        },
                                            // Glowing effect
                                            count > 0 && React.createElement('div', {
                                                className: "absolute inset-0 rounded-t-lg animate-pulse",
                                                style: { 
                                                    background: `linear-gradient(to top, transparent 0%, ${getBarColor(state)}20 100%)`
                                                }
                                            })
                                        )
                                    ),
                                    
                                    // State label
                                    React.createElement('div', { className: "mt-3 text-center" },
                                        React.createElement('div', { 
                                            className: "text-sm font-bold",
                                            style: { 
                                                minWidth: '80px',
                                                wordBreak: 'break-all'
                                            }
                                        }, `|${state}⟩`),
                                        React.createElement('div', { className: "text-xs text-gray-400" },
                                            count > 0 && `${((count / currentIndex) * 100).toFixed(1)}%`
                                        )
                                    )
                                );
                            })
                        )
                    ),

                    React.createElement('div', { 
                        className: "mt-6 grid gap-4",
                        style: { 
                            gridTemplateColumns: `repeat(${Math.min(uniqueStates.length, 8)}, 1fr)` 
                        }
                    },

                        uniqueStates
                            .map(state => ({ state, count: counts[state] || 0 }))
                            .sort((a, b) => b.count - a.count)
                            .map(({ state }) =>
                                React.createElement('div', {
                                    key: state,
                                    className: "bg-gray-800 p-4 rounded-lg text-center border-l-4",
                                    style: { borderColor: getBarColor(state) }
                                },
                                    React.createElement('div', {
                                        className: "text-2xl font-bold",
                                        style: { color: getBarColor(state) }
                                    }, counts[state] || 0),
                                    React.createElement('div', { 
                                        className: "text-gray-400",
                                        style: { fontSize: '0.9rem' }
                                    }, `|${state}⟩`),
                                    React.createElement('div', { className: "text-sm text-gray-500" },
                                        currentIndex > 0 ? `${(((counts[state] || 0) / currentIndex) * 100).toFixed(1)}%` : '0%'
                                    )
                                )
                            )
                    )
                )
            );
        };
